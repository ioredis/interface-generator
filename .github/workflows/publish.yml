name: Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to publish
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "ioredis robot"
          git config user.email "ioredis-robot@redis.com"

      - name: Bump package version
        run: npm version "${{ inputs.release_type }}" -m "chore(release): %s"

      - name: Verify release push
        run: git push --dry-run origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Push release commit and tag
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
